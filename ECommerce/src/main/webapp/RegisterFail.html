<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Registration Failed</title>
  <style>
    body, html {
      height: 100%;
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #e74c3c, #c0392b);
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      background-color: #fff;
      padding: 40px 30px;
      border-radius: 12px;
      width: 400px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
      text-align: center;
    }

    h2 {
      color: #e74c3c;
      margin-bottom: 15px;
    }

    p {
      color: #333;
      font-size: 16px;
      margin-bottom: 25px;
    }

    a.button {
      display: inline-block;
      padding: 12px 20px;
      background-color: #e74c3c;
      color: #fff;
      text-decoration: none;
      border-radius: 6px;
      font-weight: bold;
      transition: background-color 0.3s ease;
    }

    a.button:hover {
      background-color: #c0392b;
    }
  </style>
</head>
<body>

  <div class="container">
    <h2>Registration Failed</h2>
    <p>Oops! Something went wrong. Please try registering again.</p>
    <a href="Register.html" class="button">Try Again</a>
  </div>

</body>
</html>
